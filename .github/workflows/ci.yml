# SPDX-License-Identifier: BSL-1.0
#
# edn-cpp CI — two-gate pipeline.
#
# Gate 1 (build-and-test): all compilers, Release build, runs on push + PR.
# Gate 2 (sanitize):       Clang only, Debug + ASan + UBSan, PR only,
#                           runs only after gate 1 is fully green.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: build / ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04, compiler: gcc-14,     cc: gcc-14,   cxx: g++-14     }
          - { os: ubuntu-24.04, compiler: clang-18,   cc: clang-18, cxx: clang++-18 }
          - { os: macos-15,     compiler: apple-clang, cc: clang,   cxx: clang++    }

    steps:
      - uses: actions/checkout@v4

      - name: Cache CMake FetchContent deps
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: ${{ runner.os }}-${{ matrix.compiler }}-cmake-deps-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: ${{ runner.os }}-${{ matrix.compiler }}-cmake-deps-

      - name: Configure
        env:
          CC:  ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -S . -B build --preset ci \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitize:
    name: sanitize / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: build-and-test
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04, cc: clang-18, cxx: clang++-18 }
          - { os: macos-15,     cc: clang,    cxx: clang++    }

    steps:
      - uses: actions/checkout@v4

      - name: Cache CMake FetchContent deps (sanitize)
        uses: actions/cache@v4
        with:
          path: build-san/_deps
          key: ${{ runner.os }}-clang-san-cmake-deps-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: ${{ runner.os }}-clang-san-cmake-deps-

      - name: Configure
        env:
          CC:  ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -S . -B build-san --preset sanitize \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}

      - name: Build
        run: cmake --build build-san --parallel

      - name: Test
        run: ctest --test-dir build-san --output-on-failure

  format-check:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format-18

      - name: Check formatting
        run: |
          find include src tests -name '*.cpp' -o -name '*.hpp' | \
            xargs clang-format-18 --dry-run --Werror
